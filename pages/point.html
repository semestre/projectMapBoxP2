<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Point</title>
</head>

<body>

  <h2>Edit Point</h2>

  <div id="editPointModal" class="modal" style="display: none;">
    <div class="modal-content">
      <h2>Edit Point</h2>

      <input type="text" id="editName" placeholder="Name">
      <input type="text" id="editDescription" placeholder="Description">
      <input type="number" id="editLat" placeholder="Latitude">
      <input type="number" id="editLng" placeholder="Longitude">

      <br><br>

      <button id="savePointChanges">Save</button>
      <button id="closeModal">Cancel</button>
    </div>
  </div>

</body>

</html>
